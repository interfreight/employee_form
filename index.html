<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Employee Dashboard</title>
<style>
body{font-family:Segoe UI,sans-serif;background:#f4f7fb;padding:20px}
.container{max-width:1200px;margin:auto;background:#fff;padding:25px;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
input,select,textarea{padding:10px;width:100%;border:1px solid #ccc;border-radius:8px}
.section{margin:20px 0}
.section h3{color:#003366}
.dynamic-row{display:grid;grid-template-columns:repeat(4,1fr) 80px;gap:10px;margin-bottom:10px}
.btn{padding:10px 15px;border:none;border-radius:8px;cursor:pointer}
.add{background:#28a745;color:#fff}
.remove{background:#dc3545;color:#fff}
.save{background:#F4C542;color:#003366;width:100%;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>One-Page HR Employee Dashboard</h1>

<div class="section"><h3>Personal Information</h3>
<div class="grid">
<input placeholder="Employee Number">
<input placeholder="Full Name">
<input placeholder="Gender">
<input type="date">
<input placeholder="Place of Birth">
<input placeholder="Nationality">
<input placeholder="Citizenship">
<input placeholder="Religion">
<input placeholder="Marital Status">
<input placeholder="Spouse Name">
<input placeholder="Father Name">
<input placeholder="Mother Name">
</div></div>

<div class="section"><h3>Contact Information</h3>
<div class="grid">
<input placeholder="Mobile Number">
<input placeholder="Personal Email">
<input placeholder="Home Address">
<input placeholder="Local Address">
</div>
<textarea placeholder="Permanent Address"></textarea>
</div>

<div class="section"><h3>Dependents</h3>
<button class="btn add" onclick="addDependent()">+ Add Dependent</button>
<div id="dependents"></div>
</div>

<div class="section"><h3>Education</h3>
<button class="btn add" onclick="addEducation()">+ Add Education</button>
<div id="education"></div>
</div>

<div class="section"><h3>Employment History</h3>
<button class="btn add" onclick="addEmployment()">+ Add Employment</button>
<div id="employment"></div>
</div>

<button class="btn save">Save Employee Profile</button>
</div>

<script>
function addDependent(){
 const d=document.createElement('div');
 d.className='dynamic-row';
 d.innerHTML=`<input placeholder="Dependent Name"><input placeholder="Relationship"><input type="date"><input placeholder="Occupation"><button class="btn remove" onclick="this.parentElement.remove()">X</button>`;
 document.getElementById('dependents').appendChild(d);
}
function addEducation(){
 const d=document.createElement('div');
 d.className='dynamic-row';
 d.innerHTML=`<input placeholder="Level"><input placeholder="School"><input placeholder="Year"><input placeholder="Certificate"><button class="btn remove" onclick="this.parentElement.remove()">X</button>`;
 document.getElementById('education').appendChild(d);
}
function addEmployment(){
 const d=document.createElement('div');
 d.className='dynamic-row';
 d.innerHTML=`<input placeholder="Company"><input placeholder="Job Title"><input placeholder="From"><input placeholder="To"><button class="btn remove" onclick="this.parentElement.remove()">X</button>`;
 document.getElementById('employment').appendChild(d);
}
</script>
</body>
</html>
