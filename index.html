<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Onboarding System</title>

<style>
body{
.section{
background:#fff;
padding:25px;
border-radius:14px;
box-shadow:0 2px 12px rgba(0,0,0,.06);
margin-bottom:20px;
}

.section-title{
font-size:18px;
font-weight:700;
color:#003366;
margin-bottom:20px;
padding-bottom:10px;
border-bottom:2px solid #edf2f7;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.field{
display:flex;
flex-direction:column;
gap:6px;
}

.field label{
font-size:13px;
font-weight:600;
color:#444;
}

input,
select,
textarea{
padding:12px;
border:1px solid #d9dee7;
border-radius:10px;
font-size:14px;
width:100%;
box-sizing:border-box;
}

textarea{
resize:vertical;
min-height:90px;
}

.photo-box{
width:180px;
height:180px;
border:2px dashed #003366;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
overflow:hidden;
background:#fafafa;
}

.photo-box img{
width:100%;
height:100%;
object-fit:cover;
}

.submit-area{
position:sticky;
bottom:0;
background:white;
padding:15px;
box-shadow:0 -3px 10px rgba(0,0,0,.08);
margin-top:20px;
}

.btn{
background:#003366;
color:white;
border:none;
padding:15px;
width:100%;
font-size:15px;
font-weight:700;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>
  
<div class="container">

<!-- PHOTO -->
<div class="section">
<div class="section-title">Employee Photo</div>

<div class="photo-box">
<img id="photoPreview">
</div>

<br>

<input type="file" id="employee_photo">
</div>

<!-- EMPLOYEE -->
<div class="section">
<div class="section-title">Employee Information</div>

<div class="grid">

<div class="field">
<label>Full Name</label>
<input id="fullName" readonly>
</div>

<div class="field">
<label>Department</label>
<input id="department" readonly>
</div>

<div class="field">
<label>Position</label>
<input id="position">
</div>

<div class="field">
<label>Employee Number</label>
<input id="employee_number">
</div>

<div class="field">
<label>Employment Status</label>
<select id="employment_status">
<option>Regular</option>
<option>Probationary</option>
<option>Contractual</option>
</select>
</div>

<div class="field">
<label>Date Hired</label>
<input type="date" id="date_hired">
</div>

</div>
</div>

<!-- PERSONAL -->
<div class="section">
<div class="section-title">Personal Information</div>

<div class="grid">

<div class="field">
<label>Sex/Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="field">
<label>Date of Birth</label>
<input type="date" id="date_of_birth">
</div>

<div class="field">
<label>Place of Birth</label>
<input id="place_of_birth">
</div>

<div class="field">
<label>Nationality</label>
<input id="nationality">
</div>

<div class="field">
<label>Citizenship</label>
<input id="citizenship">
</div>

<div class="field">
<label>Marital Status</label>
<select id="marital_status">
<option>Single</option>
<option>Married</option>
<option>Widowed</option>
<option>Separated</option>
</select>
</div>

<div class="field">
<label>Religion</label>
<input id="religion">
</div>

<div class="field">
<label>Mobile Number</label>
<input id="mobile_number">
</div>

<div class="field">
<label>Personal Email</label>
<input id="personal_email">
</div>

</div>
</div>

<!-- FAMILY -->
<div class="section">
<div class="section-title">Family Information</div>

<div class="grid">

<div class="field">
<label>Father's Name</label>
<input id="father_name">
</div>

<div class="field">
<label>Mother's Name</label>
<input id="mother_name">
</div>

<div class="field">
<label>Spouse Name</label>
<input id="spouse_name">
</div>

<div class="field">
<label>Home Address</label>
<textarea id="home_address"></textarea>
</div>

<div class="field">
<label>Local Address</label>
<textarea id="local_address"></textarea>
</div>

</div>
</div>

<!-- GOVERNMENT IDS -->
<div class="section">
<div class="section-title">Government Information</div>

<div class="grid">

<input id="sss" placeholder="SSS Number">
<input id="philhealth" placeholder="PhilHealth Number">
<input id="pagibig" placeholder="Pag-IBIG Number">
<input id="tin" placeholder="TIN Number">

</div>
</div>

<!-- DEPENDENTS -->
<div class="section">
<div class="section-title">Dependents (Maximum 5)</div>

<div id="dependents">

<div class="grid row">
<input placeholder="Dependent Name">
<input placeholder="Relationship">
<input type="date">
<input placeholder="Occupation">
</div>

<div class="grid row">
<input placeholder="Dependent Name">
<input placeholder="Relationship">
<input type="date">
<input placeholder="Occupation">
</div>

<div class="grid row">
<input placeholder="Dependent Name">
<input placeholder="Relationship">
<input type="date">
<input placeholder="Occupation">
</div>

<div class="grid row">
<input placeholder="Dependent Name">
<input placeholder="Relationship">
<input type="date">
<input placeholder="Occupation">
</div>

<div class="grid row">
<input placeholder="Dependent Name">
<input placeholder="Relationship">
<input type="date">
<input placeholder="Occupation">
</div>

</div>
</div>

<!-- EDUCATION -->
<div class="section">
<div class="section-title">Academic Qualifications</div>

<div id="education">

<div class="grid row">

<select>
<option>High School Graduate</option>
<option>Vocational</option>
<option>College Undergraduate</option>
<option>College Graduate</option>
<option>Master's Degree</option>
<option>Doctorate Degree</option>
</select>

<input placeholder="Institute">
<input placeholder="Year Completed">
<input placeholder="Certificate Obtained">

</div>

</div>
</div>

<!-- EMPLOYMENT HISTORY -->
<div class="section">
<div class="section-title">Previous Employment</div>

<div id="employment"></div>

<div class="add-btn" onclick="addEmployment()">
+ Add Employment History
</div>

</div>

<div class="submit-area">
<button class="btn" onclick="saveAll()">
COMPLETE EMPLOYEE ONBOARDING
</button>
</div>

</div>
location.href="https://interfreight.github.io/Hr_Dashboard/";
}
</script>

</body>
</html>
