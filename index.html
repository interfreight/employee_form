<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Onboarding System</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f5f7fb;
}

.header{
background:#003366;
color:white;
padding:18px 25px;
font-size:18px;
font-weight:600;
position:sticky;
top:0;
z-index:10;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab{
padding:10px 15px;
background:white;
border-radius:8px;
cursor:pointer;
border:1px solid #ddd;
font-weight:600;
}

.tab.active{
background:#003366;
color:white;
border:none;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
display:none;
}

.card.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:100%;
outline:none;
}

label{
font-size:13px;
font-weight:600;
color:#333;
}

.section-title{
font-size:16px;
font-weight:700;
margin-bottom:15px;
color:#003366;
}

.btn{
background:#F4C542;
border:none;
padding:12px;
width:100%;
margin-top:20px;
font-weight:700;
border-radius:8px;
cursor:pointer;
}

.btn:hover{opacity:.9}

.add-btn{
background:#e9eef7;
padding:8px;
border-radius:8px;
cursor:pointer;
border:1px dashed #003366;
margin-top:10px;
}

.row{
margin-bottom:15px;
}

@media(max-width:768px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
Employee Onboarding System
</div>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="showTab(0)">Profile</div>
<div class="tab" onclick="showTab(1)">Family</div>
<div class="tab" onclick="showTab(2)">Education</div>
<div class="tab" onclick="showTab(3)">Employment</div>
</div>

<!-- PROFILE -->
<div class="card active">
<div class="section-title">Employee Profile</div>

<div class="grid">
<input id="fullName" readonly>
<input id="department" readonly>

<input id="address" placeholder="Address">
<input id="mobile_number" placeholder="Mobile Number">
<input id="personal_email" placeholder="Email">

<input id="gender" placeholder="Gender">
<input id="date_of_birth" type="date">
<input id="place_of_birth" placeholder="Place of Birth">

<input id="nationality" placeholder="Nationality">
<input id="citizenship" placeholder="Citizenship">
<input id="religion" placeholder="Religion">

<input id="marital_status" placeholder="Marital Status">
<input id="spouse_name" placeholder="Spouse Name">

<input id="sss" placeholder="SSS">
<input id="philhealth" placeholder="PhilHealth">
<input id="pagibig" placeholder="Pag-IBIG">
<input id="tin" placeholder="TIN">

<input id="position" placeholder="Position">
<input id="employee_number" placeholder="Employee Number">

<select id="employment_status">
<option>Regular</option>
<option>Probationary</option>
<option>Contractual</option>
</select>

<input id="date_hired" type="date">
</div>
</div>

<!-- FAMILY -->
<div class="card">
<div class="section-title">Dependents</div>
<div id="dependents"></div>
<div class="add-btn" onclick="addDependent()">+ Add Dependent</div>
</div>

<!-- EDUCATION -->
<div class="card">
<div class="section-title">Education</div>
<div id="education"></div>
<div class="add-btn" onclick="addEducation()">+ Add Education</div>
</div>

<!-- EMPLOYMENT -->
<div class="card">
<div class="section-title">Employment History</div>
<div id="employment"></div>
<div class="add-btn" onclick="addEmployment()">+ Add Employment</div>

<button class="btn" onclick="saveAll()">SUBMIT ALL</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
"https://tuihpvykuqbqnfyfepql.supabase.co",
"YOUR_KEY"
);

const userId = new URLSearchParams(location.search).get("id");

/* ---------------- TABS ---------------- */
function showTab(i){
document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".card")[i].classList.add("active");
document.querySelectorAll(".tab")[i].classList.add("active");
}

/* ---------------- LOAD ---------------- */
async function load(){
const { data } = await supabase.from("users").select("*").eq("id", userId).single();
fullName.value = data.full_name;
department.value = data.department;
}
load();

/* ---------------- DYNAMIC UI ---------------- */
function addDependent(){
dependents.innerHTML += `
<div class="grid row">
<input placeholder="Name">
<input placeholder="Relationship">
<input type="date">
<input placeholder="Occupation">
</div>`;
}

function addEducation(){
education.innerHTML += `
<div class="grid row">
<input placeholder="Level">
<input placeholder="Institute">
<input type="number" placeholder="Year">
<input placeholder="Certificate">
</div>`;
}

function addEmployment(){
employment.innerHTML += `
<div class="grid row">
<input placeholder="Company">
<input placeholder="Job Title">
<input type="date">
<input type="date">
<input placeholder="Reason">
</div>`;
}

/* ---------------- SAVE ---------------- */
async function saveAll(){

await supabase.from("employee_profiles").upsert({
user_id: userId,
address: address.value,
mobile_number: mobile_number.value,
personal_email: personal_email.value,
gender: gender.value,
date_of_birth: date_of_birth.value,
place_of_birth: place_of_birth.value,
nationality: nationality.value,
citizenship: citizenship.value,
religion: religion.value,
marital_status: marital_status.value,
spouse_name: spouse_name.value,
sss: sss.value,
philhealth: philhealth.value,
pagibig: pagibig.value,
tin: tin.value,
position: position.value,
employee_number: employee_number.value,
employment_status: employment_status.value,
date_hired: date_hired.value,
profile_completed: true
});

document.querySelectorAll("#dependents .grid").forEach(async r=>{
let i=r.querySelectorAll("input");
await supabase.from("employee_dependents").insert({
employee_id:userId,
dependent_name:i[0].value,
relationship:i[1].value,
date_of_birth:i[2].value,
occupation:i[3].value
});
});

document.querySelectorAll("#education .grid").forEach(async r=>{
let i=r.querySelectorAll("input");
await supabase.from("employee_education").insert({
employee_id:userId,
education_level:i[0].value,
institute:i[1].value,
year_completed:i[2].value,
certificate_obtained:i[3].value
});
});

document.querySelectorAll("#employment .grid").forEach(async r=>{
let i=r.querySelectorAll("input");
await supabase.from("employee_employment_history").insert({
employee_id:userId,
company_name:i[0].value,
job_title:i[1].value,
date_from:i[2].value,
date_to:i[3].value,
leaving_reason:i[4].value
});
});

alert("Employee onboarding completed!");
location.href="https://interfreight.github.io/Hr_Dashboard/";
}
</script>

</body>
</html>
